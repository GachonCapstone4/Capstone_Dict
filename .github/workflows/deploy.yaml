name: Build & Push to Docker Hub

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          username: ${{ vars.CAPSTONE_CI_VAR }}
          password: ${{ secrets.CAPSTONE_CI_SECRET }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ vars.CAPSTONE_CI_VAR }}/capstonetest:latest
            ${{ vars.CAPSTONE_CI_VAR }}/capstonetest:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
